services:
  - type: web
    name: krishiai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: HF_API_KEY
        sync: false
      - key: ENABLE_LOCAL_EMBEDDINGS
        value: "false"
      - key: MODEL_DIR
        value: models
